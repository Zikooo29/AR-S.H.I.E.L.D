<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>S.H.I.E.L.D. Mobile AR</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="ar.css" />
</head>
<body class="ar-camera-body">
  <main class="camera-ar" id="cameraAr">
    <!-- Live camera feed. JavaScript requests the back camera with facingMode: environment. -->
    <video class="camera-feed" id="cameraFeed" autoplay muted playsinline></video>

    <div class="camera-shade" aria-hidden="true"></div>

    <header class="camera-hud">
      <img src="AR scherm 1 afbeeldingen/S.H.I.E.L.D..png" alt="S.H.I.E.L.D." />
      <div>
        <p>Mobile AR clearance</p>
        <h1>Hero Dossier Scan</h1>
      </div>
    </header>

    <!-- This is the first AR panel layer that appears in the real camera environment. -->
    <section class="ar-panel-layer" aria-label="S.H.I.E.L.D. AR paneel">
      <img class="ar-environment-panel" src="AR scherm 1 afbeeldingen/AR Omgeving 1.png" alt="S.H.I.E.L.D. AR dossier paneel" />
      <p class="scan-status" id="scanStatus">Camera access pending...</p>
    </section>

    <section class="camera-permission" id="cameraPermission" aria-live="polite">
      <h2>Camera toegang nodig</h2>
      <p>Sta camera toegang toe om het S.H.I.E.L.D. AR-paneel in je omgeving te openen.</p>
      <button type="button" id="startCameraButton">Start AR camera</button>
    </section>
  </main>

  <script src="ar.js"></script>
</body>
</html>
