<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>S.H.I.E.L.D. Mobile AR</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="assets/aframe.min.js"></script>
  <link rel="stylesheet" href="ar.css" />
</head>
<body class="ar-camera-body">
  <main class="camera-ar" id="cameraAr">
    <video class="camera-feed" id="cameraFeed" autoplay muted playsinline></video>
    <div class="camera-shade" aria-hidden="true"></div>

    <section class="ar-panel-layer" id="selectPanel" aria-label="S.H.I.E.L.D. heldselectie paneel">
      <div class="ar-dossier-panel">
        <img class="panel-logo" src="AR scherm 1 afbeeldingen/Logo.png" alt="S.H.I.E.L.D. logo" />
        <img class="panel-wordmark" src="AR scherm 1 afbeeldingen/S.H.I.E.L.D..png" alt="S.H.I.E.L.D." />

        <div class="panel-search" aria-label="Zoekbalk">
          <img class="search-frame" src="AR scherm 1 afbeeldingen/Rectangle 14.png" alt="" />
          <img class="search-icon" src="AR scherm 1 afbeeldingen/Vergrootglas.png" alt="" />
          <input class="search-input" id="heroSearch" type="search" placeholder="SEARCH..." autocomplete="off" aria-label="Zoek held" />
        </div>

        <p class="panel-instruction">Selecteer een held om het AR-dossier te openen.</p>

        <div class="hero-button-list" aria-label="Heldselectie">
          <button class="ar-hero-button" type="button" data-hero="spiderman" data-search="spiderman spider-man peter parker">
            <img class="button-frame" src="AR scherm 1 afbeeldingen/Rectangle 15.png" alt="" />
            <img class="profile-dot" src="AR scherm 1 afbeeldingen/PF Spiderman.png" alt="" />
            <img class="hero-label spiderman-label" src="AR scherm 1 afbeeldingen/Spiderman.png" alt="Spiderman" />
          </button>
          <button class="ar-hero-button" type="button" data-hero="deadpool" data-search="deadpool wade wilson">
            <img class="button-frame" src="AR scherm 1 afbeeldingen/Rectangle 16.png" alt="" />
            <img class="profile-dot" src="AR scherm 1 afbeeldingen/PF Deadpool.png" alt="" />
            <img class="hero-label deadpool-label" src="AR scherm 1 afbeeldingen/Deadpool.png" alt="Deadpool" />
          </button>
          <button class="ar-hero-button" type="button" data-hero="ironman" data-search="iron man ironman tony stark">
            <img class="button-frame" src="AR scherm 1 afbeeldingen/Rectangle 16-1.png" alt="" />
            <img class="profile-dot" src="AR scherm 1 afbeeldingen/PF Ironman.png" alt="" />
            <img class="hero-label ironman-label" src="AR scherm 1 afbeeldingen/Iron man.png" alt="Iron Man" />
          </button>
        </div>

        <div class="panel-footer">
          <span id="scanStatus">Camera access pending...</span>
        </div>
      </div>
    </section>

    <section class="hero-dossier-layer is-hidden" id="heroDossierLayer" aria-label="S.H.I.E.L.D. hero dossier">
      <div class="spiderman-model-stage is-hidden" id="spidermanModelStage" aria-hidden="true">
        <a-scene
          class="spiderman-model-scene"
          embedded
          renderer="alpha: true; antialias: true; colorManagement: true"
          background="transparent: true"
          loading-screen="enabled: false"
          vr-mode-ui="enabled: false"
          device-orientation-permission-ui="enabled: false">
          <a-assets>
            <a-asset-item id="spidermanModelAsset" src="assets/spiderman.glb"></a-asset-item>
          </a-assets>

          <a-entity light="type: ambient; color: #7edcff; intensity: 1.3"></a-entity>
          <a-entity light="type: directional; color: #ffffff; intensity: 1.8" position="0 2 1"></a-entity>
          <a-entity light="type: point; color: #26ddff; intensity: 2.2; distance: 6" position="0 1.5 1.4"></a-entity>

          <a-entity
            id="spidermanModel"
            gltf-model="#spidermanModelAsset"
            position="0 -0.55 -2.7"
            rotation="0 180 0"
            scale="0.72 0.72 0.72"
            animation__float="property: position; to: 0 -0.42 -2.7; dir: alternate; dur: 1500; loop: true; easing: easeInOutSine"
            animation__scan="property: rotation; to: 0 540 0; dur: 9000; loop: true; easing: linear">
          </a-entity>

          <a-camera position="0 0 0" look-controls="enabled: false" wasd-controls="enabled: false"></a-camera>
        </a-scene>
        <span class="model-load-status" id="modelLoadStatus">Spider-Man AR model laden...</span>
      </div>
      <button class="dossier-back-button" id="backToSelect" type="button">Terug</button>
    </section>

    <section class="camera-permission" id="cameraPermission" aria-live="polite">
      <h2>Camera toegang nodig</h2>
      <p>Sta camera toegang toe om het S.H.I.E.L.D. AR-paneel in je omgeving te openen.</p>
      <button type="button" id="startCameraButton">Start AR camera</button>
    </section>
  </main>

  <script src="ar.js"></script>
</body>
</html>
