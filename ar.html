<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>S.H.I.E.L.D. Mobiele AR</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="assets/aframe.min.js"></script>
  <link rel="stylesheet" href="ar.css" />
</head>
<body class="ar-camera-body">
  <main class="camera-ar" id="cameraAr">
    <video class="camera-feed" id="cameraFeed" autoplay muted playsinline></video>
    <div class="camera-shade" aria-hidden="true"></div>

    <section class="ar-panel-layer" id="selectPanel" aria-label="S.H.I.E.L.D. heldselectie paneel">
      <div class="ar-dossier-panel">
        <img class="panel-logo" src="AR scherm 1 afbeeldingen/Logo.png" alt="S.H.I.E.L.D. logo" />
        <img class="panel-wordmark" src="AR scherm 1 afbeeldingen/S.H.I.E.L.D..png" alt="S.H.I.E.L.D." />

        <div class="panel-search" aria-label="Zoekbalk">
          <img class="search-frame" src="AR scherm 1 afbeeldingen/Rectangle 14.png" alt="" />
          <img class="search-icon" src="AR scherm 1 afbeeldingen/Vergrootglas.png" alt="" />
          <input class="search-input" id="heroSearch" type="search" placeholder="ZOEKEN..." autocomplete="off" aria-label="Zoek held" />
        </div>

        <p class="panel-instruction">Selecteer een held om het AR-dossier te openen.</p>

        <div class="hero-button-list" aria-label="Heldselectie">
          <button class="ar-hero-button" type="button" data-hero="spiderman" data-search="spiderman spider-man peter parker">
            <img class="button-frame" src="AR scherm 1 afbeeldingen/Rectangle 15.png" alt="" />
            <img class="profile-dot" src="AR scherm 1 afbeeldingen/PF Spiderman.png" alt="" />
            <img class="hero-label spiderman-label" src="AR scherm 1 afbeeldingen/Spiderman.png" alt="Spiderman" />
          </button>
          <button class="ar-hero-button" type="button" data-hero="deadpool" data-search="deadpool wade wilson">
            <img class="button-frame" src="AR scherm 1 afbeeldingen/Rectangle 16.png" alt="" />
            <img class="profile-dot" src="AR scherm 1 afbeeldingen/PF Deadpool.png" alt="" />
            <img class="hero-label deadpool-label" src="AR scherm 1 afbeeldingen/Deadpool.png" alt="Deadpool" />
          </button>
          <button class="ar-hero-button" type="button" data-hero="ironman" data-search="iron man ironman tony stark">
            <img class="button-frame" src="AR scherm 1 afbeeldingen/Rectangle 16-1.png" alt="" />
            <img class="profile-dot" src="AR scherm 1 afbeeldingen/PF Ironman.png" alt="" />
            <img class="hero-label ironman-label" src="AR scherm 1 afbeeldingen/Iron man.png" alt="Iron Man" />
          </button>
        </div>

        <div class="panel-footer">
          <span id="scanStatus">Camera-toegang wordt aangevraagd...</span>
        </div>
      </div>
    </section>

    <section class="hero-dossier-layer is-hidden" id="heroDossierLayer" aria-label="S.H.I.E.L.D. heldendossier">
      <div class="hero-model-stage is-hidden" id="heroModelStage" aria-hidden="true">
        <a-scene
          class="hero-model-scene"
          embedded
          renderer="alpha: true; antialias: true; colorManagement: true"
          background="transparent: true"
          loading-screen="enabled: false"
          vr-mode-ui="enabled: false"
          device-orientation-permission-ui="enabled: false">
          <a-assets>
            <a-asset-item id="spidermanModelAsset" src="assets/spiderman.glb"></a-asset-item>
            <a-asset-item id="deadpoolModelAsset" src="assets/deadpool.glb"></a-asset-item>
            <a-asset-item id="ironmanModelAsset" src="assets/ironman.glb"></a-asset-item>
            <a-asset-item id="spidermanStatsAsset" src="assets/stats.glb"></a-asset-item>
            <a-asset-item id="spidermanDescriptionAsset" src="assets/spidermanbeschrijving.glb"></a-asset-item>
            <a-asset-item id="deadpoolDescriptionAsset" src="assets/deadpoolbeschrijving.glb"></a-asset-item>
            <a-asset-item id="ironmanDescriptionAsset" src="assets/ironmanbeschrijving.glb"></a-asset-item>
            <audio id="spidermanSound" src="assets/sounds/spiderman.mp3" preload="auto"></audio>
            <audio id="deadpoolSound" src="assets/sounds/deadpool.mp3" preload="auto"></audio>
            <audio id="ironmanSound" src="assets/sounds/ironman.mp3" preload="auto"></audio>
          </a-assets>

          <a-entity light="type: ambient; color: #ffffff; intensity: 1.9"></a-entity>
          <a-entity light="type: directional; color: #ffffff; intensity: 2.4" position="0 2 1"></a-entity>
          <a-entity light="type: point; color: #7edcff; intensity: 2.6; distance: 8" position="0 1.5 1.4"></a-entity>

          <a-entity
            id="spidermanModel"
            gltf-model="#spidermanModelAsset"
            position="1.7 -2.2 -10"
            rotation="0 180 0"
            scale="0.24 0.24 0.24"
            visible="false"
            animation__float="property: position; to: 2 -1.5 -10; dir: alternate; dur: 1500; loop: true; easing: easeInOutSine"
            animation__scan="property: rotation; to: 0 540 0; dur: 9000; loop: true; easing: linear">
          </a-entity>

          <a-entity
            id="spidermanStatsPanel"
            gltf-model="#spidermanStatsAsset"
            position="-1.8 -1.2 -7.4"
            rotation="0 25 0"
            scale="4 4 4"
            visible="false">
          </a-entity>

          <a-entity
            id="spidermanDescriptionPanel"
            gltf-model="#spidermanDescriptionAsset"
            position="0 2.7 -7.6"
            rotation="10 0 0"
            scale="4 4 4"
            visible="false">
          </a-entity>

          <a-entity
            id="deadpoolModel"
            gltf-model="#deadpoolModelAsset"
            position="0.8 -2.6 -6"
            rotation="0 180 0"
            scale="30 30 30"
            visible="false"
            animation__float="property: position; to: 0.8 -2.4 -6; dir: alternate; dur: 1500; loop: true; easing: easeInOutSine"
            animation__scan="property: rotation; to: 0 540 0; dur: 9000; loop: true; easing: linear">
          </a-entity>

          <a-entity
            id="deadpoolStatsPanel"
            gltf-model="#spidermanStatsAsset"
            position="-1.8 -1.2 -7.4"
            rotation="0 25 0"
            scale="4 4 4"
            visible="false">
          </a-entity>

          <a-entity
            id="deadpoolDescriptionPanel"
            gltf-model="#deadpoolDescriptionAsset"
            position="0 2.7 -7.6"
            rotation="10 0 0"
            scale="4 4 4"
            visible="false">
          </a-entity>

          <a-entity
            id="ironmanModel"
            gltf-model="#ironmanModelAsset"
            position="1 -3.8 -7.8"
            rotation="0 180 0"
            scale="2.5 2.5 2.5"
            visible="false"
            animation__float="property: position; to: 1 -4 -7.8; dir: alternate; dur: 1500; loop: true; easing: easeInOutSine"
            animation__scan="property: rotation; to: 0 540 0; dur: 9000; loop: true; easing: linear">
          </a-entity>

          <a-entity
            id="ironmanStatsPanel"
            gltf-model="#spidermanStatsAsset"
            position="-1.8 -1.2 -7.4"
            rotation="0 25 0"
            scale="4 4 4"
            visible="false">
          </a-entity>

          <a-entity
            id="ironmanDescriptionPanel"
            gltf-model="#ironmanDescriptionAsset"
            position="0 2.7 -7.6"
            rotation="10 0 0"
            scale="4 4 4"
            visible="false">
          </a-entity>

          <a-camera position="0 0 0" look-controls="enabled: false" wasd-controls="enabled: false"></a-camera>
        </a-scene>
        <span class="model-load-status" id="modelLoadStatus">AR-model laden...</span>
      </div>
      <button class="dossier-back-button" id="backToSelect" type="button">Terug</button>
    </section>

    <section class="camera-permission" id="cameraPermission" aria-live="polite">
      <h2>Camera toegang nodig</h2>
      <p>Sta camera toegang toe om het S.H.I.E.L.D. AR-paneel in je omgeving te openen.</p>
      <button type="button" id="startCameraButton">Start AR-camera</button>
    </section>
  </main>

  <script src="ar.js"></script>
</body>
</html>
